name: Create GitHub Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Minor Version
        id: version
        shell: bash
        run: |
          FILE="app/build.gradle.kts"

          VERSION=$(grep 'versionName =' "$FILE" | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode =' "$FILE" | grep -o '[0-9]\+')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          MINOR=$((MINOR + 1))
          PATCH=0
          VERSION_CODE=$((VERSION_CODE + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" "$FILE"
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" "$FILE"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts

          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]" || exit 0

          git push

      - name: Verify APK Exists
        run: |
          test -f app/release/app-release.apk

      - name: Rename APK
        run: |
          mkdir release
          cp app/release/app-release.apk \
            "release/Learning Planner (V${{ steps.version.outputs.version }}).apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Learning Planner v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/Learning Planner (V${{ steps.version.outputs.version }}).apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}