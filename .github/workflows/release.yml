name: Android Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Increment Version
        id: version
        shell: bash
        run: |
          FILE=app/build.gradle.kts

          VERSION=$(grep 'versionName =' $FILE | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode =' $FILE | head -1 | grep -o '[0-9]\+')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((VERSION_CODE+1))

          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" $FILE
          sed -i "s/versionCode = .*/versionCode = $NEW_CODE/" $FILE

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add app/build.gradle.kts
          git commit -m "chore: release v${{ steps.version.outputs.version }}" || exit 0
          git push

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir release
          cp app/build/outputs/apk/release/app-release.apk \
          "release/Learning Planner (V${{ steps.version.outputs.version }}).apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Learning Planner v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/Learning Planner (V${{ steps.version.outputs.version }}).apk